services:
  browser:
    image: "${IMAGE_NAME:-browser-tool:local}"
    build:
      context: .
      dockerfile: Dockerfile
    container_name: browser-tool
    environment:
      DISPLAY_NUM: "${DISPLAY_NUM:-99}"
      SCREEN_WIDTH: "${SCREEN_WIDTH:-1920}"
      SCREEN_HEIGHT: "${SCREEN_HEIGHT:-1080}"
      SCREEN_DEPTH: "${SCREEN_DEPTH:-24}"
      BROWSER_START_URL: "${BROWSER_START_URL:-https://www.google.com}"
      CHROMIUM_NO_SANDBOX: "${CHROMIUM_NO_SANDBOX:-1}"
      CHROMIUM_FLAGS: "${CHROMIUM_FLAGS:-}"
      TZ: "${TZ:-UTC}"
      API_PORT: "${API_PORT:-8080}"
      VNC_PASSWORD: "${VNC_PASSWORD:-}"
      API_KEY: "${API_KEY:-}"
    ports:
      - "${BIND_ADDRESS:-0.0.0.0}:${RAW_VNC_HOST_PORT:-15900}:5900"  # x11vnc raw VNC
      - "${BIND_ADDRESS:-0.0.0.0}:${VNC_WS_HOST_PORT:-16080}:6080"   # noVNC WS proxy (/websockify)
      - "${BIND_ADDRESS:-0.0.0.0}:${CDP_HOST_PORT:-19222}:9222"      # Chrome CDP
      - "${BIND_ADDRESS:-0.0.0.0}:${API_HOST_PORT:-18080}:8080"      # Tab API: /tabs/state.json /focus /close
    shm_size: "${SHM_SIZE:-4gb}"
    volumes:
      - browser-data:/home/browser/.config/chromium
      - ./downloads:/home/browser/Downloads
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s
    restart: unless-stopped
    stop_grace_period: 20s

volumes:
  browser-data:
